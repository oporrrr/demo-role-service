services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-service-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: demo_role_service
    ports:
      - "5433:5432"
    volumes:
      - demo-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d demo_role_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: demo-service-redis
    ports:
      - "6380:6379"
    volumes:
      - demo-service-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  demo-service-postgres-data:
  demo-service-redis-data:
